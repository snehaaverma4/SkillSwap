<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Skills — SkillSwap</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .browse-page { padding-top: 70px; min-height: 100vh; }

    .browse-header {
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
      padding: 2.5rem 2rem;
    }

    .browse-header-inner { max-width: 1000px; margin: 0 auto; }

    .browse-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.75rem;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      max-width: 600px;
      margin-top: 1.25rem;
    }

    .search-input {
      flex: 1;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 16px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--text3); }

    .search-btn {
      padding: 11px 22px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-btn:hover { background: var(--green-dark); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .filter-pill {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 999px;
      border: 0.5px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      font-family: 'Outfit', sans-serif;
    }

    .filter-pill:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-pill.active { background: rgba(29,158,117,0.12); color: var(--green); border-color: rgba(29,158,117,0.4); }

    /* CONTENT AREA */
    .browse-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    .results-label {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 1.25rem;
    }

    .results-label span { color: var(--text); font-weight: 600; }

    /* TEACHER CARDS */
    .teacher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .teacher-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
    }

    .teacher-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .teacher-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .teacher-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .teacher-role { font-size: 12px; color: var(--text2); }

    .teacher-skills-section { margin-bottom: 10px; }

    .skills-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .skill-tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .teacher-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 10px;
      border-top: 0.5px solid var(--border);
    }

    .teacher-rating {
      font-size: 12px;
      color: var(--text2);
    }

    .teacher-sessions {
      font-size: 11px;
      color: var(--text3);
    }

    .btn-connect {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 14px;
      background: rgba(29,158,117,0.1);
      color: var(--green);
      border: 0.5px solid rgba(29,158,117,0.3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }

    .btn-connect:hover { background: rgba(29,158,117,0.2); }

    /* NO RESULTS */
    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      display: none;
    }

    .no-results p { color: var(--text2); font-size: 14px; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Skill<span>Swap</span></a>
    <ul class="nav-links">
      <li><a href="browse.html" style="color:var(--green);">Browse Skills</a></li>
      <li><a href="match.html">My Matches</a></li>
    </ul>
    <div class="nav-btns">
      <a href="profile.html" class="btn">My Profile</a>
    </div>
  </nav>

  <div class="browse-page">

    <div class="browse-header">
      <div class="browse-header-inner">
        <h1>Browse skills</h1>
        <p style="font-size:14px;color:var(--text2);">Find verified teachers. See what they want in return.</p>

        <div class="search-bar">
          <input type="text" class="search-input" id="searchInput" placeholder="Search a skill e.g. Java, Python, Design..." oninput="filterCards()" />
          <button class="search-btn" onclick="filterCards()">Search</button>
        </div>

        <div class="filters" id="filterRow">
          <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
          <button class="filter-pill" onclick="setFilter('programming',this)">Programming</button>
          <button class="filter-pill" onclick="setFilter('design',this)">Design</button>
          <button class="filter-pill" onclick="setFilter('data',this)">Data / AI</button>
          <button class="filter-pill" onclick="setFilter('maths',this)">Maths</button>
          <button class="filter-pill" onclick="setFilter('language',this)">Language</button>
        </div>
      </div>
    </div>

    <div class="browse-content">

      <div class="results-label">Showing <span id="resultCount">12</span> verified teachers</div>

      <div class="teacher-grid" id="teacherGrid">
        <!-- Cards injected by JS -->
      </div>

      <div class="no-results" id="noResults">
        <div style="font-size:32px;margin-bottom:1rem;">🔍</div>
        <p>No teachers found for that skill yet.</p>
        <p style="margin-top:6px;font-size:13px;">Be the first to teach it — <a href="register.html" style="color:var(--green);text-decoration:none;">add your skill</a>.</p>
      </div>

    </div>
  </div>

  <script>
    const teachers = [
      { name: 'Rohan Kumar', initials: 'RK', av: 'av-purple', role: 'B.Tech CSE, 3rd yr', teaches: ['Java', 'DSA', 'C++'], wants: ['Python', 'ML basics'], rating: '4.8', sessions: 14, category: 'programming' },
      { name: 'Priya Sharma', initials: 'PS', av: 'av-green', role: 'Software Engineer', teaches: ['SQL', 'Data Analysis'], wants: ['UI/UX Design', 'React'], rating: '4.9', sessions: 22, category: 'data' },
      { name: 'Arjun Mehta', initials: 'AM', av: 'av-amber', role: 'MCA Student', teaches: ['React', 'JavaScript'], wants: ['Machine Learning', 'Python'], rating: '4.7', sessions: 9, category: 'programming' },
      { name: 'Divya Nair', initials: 'DN', av: 'av-coral', role: 'Freelance Designer', teaches: ['UI/UX Design', 'Figma'], wants: ['Python', 'SQL'], rating: '5.0', sessions: 31, category: 'design' },
      { name: 'Karan Joshi', initials: 'KJ', av: 'av-purple', role: 'Data Analyst', teaches: ['Machine Learning', 'Python'], wants: ['Java', 'DSA'], rating: '4.6', sessions: 17, category: 'data' },
      { name: 'Sneha Bhat', initials: 'SB', av: 'av-green', role: 'MSc Mathematics', teaches: ['Mathematics', 'Statistics'], wants: ['Programming', 'React'], rating: '4.9', sessions: 26, category: 'maths' },
      { name: 'Vikram Rao', initials: 'VR', av: 'av-amber', role: 'Backend Developer', teaches: ['Java', 'Spring Boot'], wants: ['UI/UX Design', 'Figma'], rating: '4.7', sessions: 11, category: 'programming' },
      { name: 'Ananya Patel', initials: 'AP', av: 'av-coral', role: 'Linguistics Graduate', teaches: ['English Writing', 'Spanish'], wants: ['Python', 'Data Analysis'], rating: '4.8', sessions: 19, category: 'language' },
      { name: 'Rahul Singh', initials: 'RS', av: 'av-purple', role: 'B.Tech IT', teaches: ['C++', 'DSA', 'OS Concepts'], wants: ['Machine Learning', 'SQL'], rating: '4.5', sessions: 7, category: 'programming' },
      { name: 'Meera Iyer', initials: 'MI', av: 'av-green', role: 'Data Scientist', teaches: ['Python', 'Pandas', 'ML'], wants: ['UI/UX Design', 'English Writing'], rating: '4.9', sessions: 38, category: 'data' },
      { name: 'Dev Kapoor', initials: 'DK', av: 'av-amber', role: 'Graphic Designer', teaches: ['UI/UX Design', 'Adobe XD'], wants: ['React', 'JavaScript'], rating: '4.6', sessions: 15, category: 'design' },
      { name: 'Tanya Mishra', initials: 'TM', av: 'av-coral', role: 'MBA Student', teaches: ['Business English', 'Presentation Skills'], wants: ['Python', 'Data Analysis'], rating: '4.7', sessions: 8, category: 'language' },
    ];

    let currentFilter = 'all';

    function renderTeacher(t) {
      return `
        <a class="teacher-card" href="match.html">
          <div class="teacher-card-header">
            <div class="avatar ${t.av}">${t.initials}</div>
            <div style="flex:1;">
              <div class="teacher-name">${t.name}</div>
              <div class="teacher-role">${t.role}</div>
            </div>
            <span class="badge badge-verified">✓</span>
          </div>

          <div class="teacher-skills-section">
            <div class="skills-label">Teaches</div>
            <div class="skill-tags-row">${t.teaches.map(s=>`<span class="badge badge-teach">${s}</span>`).join('')}</div>
          </div>

          <div class="teacher-skills-section">
            <div class="skills-label">Wants to learn</div>
            <div class="skill-tags-row">${t.wants.map(s=>`<span class="badge badge-learn">${s}</span>`).join('')}</div>
          </div>

          <div class="teacher-footer">
            <div>
              <div class="teacher-rating">★ ${t.rating} rating</div>
              <div class="teacher-sessions">${t.sessions} sessions</div>
            </div>
            <button class="btn-connect" onclick="event.preventDefault();window.location.href='match.html'">Connect →</button>
          </div>
        </a>
      `;
    }

    function filterCards() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = teachers.filter(t => {
        const matchFilter = currentFilter === 'all' || t.category === currentFilter;
        const matchSearch = !query ||
          t.name.toLowerCase().includes(query) ||
          t.teaches.some(s => s.toLowerCase().includes(query)) ||
          t.wants.some(s => s.toLowerCase().includes(query));
        return matchFilter && matchSearch;
      });

      const grid = document.getElementById('teacherGrid');
      const noRes = document.getElementById('noResults');
      document.getElementById('resultCount').textContent = filtered.length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noRes.style.display = 'block';
      } else {
        noRes.style.display = 'none';
        grid.innerHTML = filtered.map(renderTeacher).join('');
      }
    }

    function setFilter(filter, el) {
      currentFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      filterCards();
    }

    // Initial render
    filterCards();
  </script>

</body>
</html>
